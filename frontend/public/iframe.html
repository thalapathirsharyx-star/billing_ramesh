<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharyx Voice Widget</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
        }
    </style>
</head>
<body>
    <script id="sharyx-voice-widget-script"></script>
    <script>
        (function() {
            const urlParams = new URLSearchParams(window.location.search);
            const key = urlParams.get('key');
            const script = document.getElementById('sharyx-voice-widget-script');
            
            if (key) {
                script.dataset.widgetKey = key;
                script.dataset.mode = 'iframe';
                script.src = './widget.js';
            } else {
                document.body.innerHTML = '<div style="font-family: sans-serif; padding: 20px; text-align: center; color: #666;">Widget Key Missing</div>';
            }
        })();
    </script>
</body>
</html>
